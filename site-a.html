<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>יפית מוכתרי · ורסיה A — בריכה שקטה</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Frank+Ruhl+Libre:wght@300;400;500&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#FBFBF9; --mist:#EEF1EC; --sky:#D8E4E2; --sage:#7E957F; --sage-dk:#54684F;
      --ink:#28302B; --ink-soft:#76807A; --line:#E2E5DF;
      --f-display:'Frank Ruhl Libre',Georgia,serif; --f-deco:'Cormorant Garamond',Georgia,serif; --f-body:'Assistant',Arial,sans-serif;
      --stage:min(92vmin,600px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{-webkit-text-size-adjust:100%}
    body{font-family:var(--f-body);background:radial-gradient(120% 90% at 50% -10%,#FFF 0%,var(--bg) 42%,#F3F2EC 100%);color:var(--ink);direction:rtl;min-height:100svh;line-height:1.7;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden}
    a{color:inherit;text-decoration:none} svg{display:block}

    /* full-page flower background: one layer, faint center, stronger at the perimeter */
    .page-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:url('assets/images/styled/flowers-beige.png') center/cover no-repeat;opacity:.30;
      -webkit-mask-image:radial-gradient(circle at 50% 47%,transparent 20%,rgba(0,0,0,.55) 50%,#000 100%);
              mask-image:radial-gradient(circle at 50% 47%,transparent 20%,rgba(0,0,0,.55) 50%,#000 100%)}

    header{position:relative;z-index:5;text-align:center;padding:clamp(1.4rem,4vh,2.6rem) 1.2rem 0}
    .wordmark{font-family:var(--f-display);font-weight:400;font-size:1.25rem;color:var(--ink)}
    .subrole{font-size:.8rem;font-weight:500;letter-spacing:.14em;color:var(--ink-soft);margin-top:.25rem}

    .stage-wrap{position:relative;z-index:2;display:grid;place-items:center;min-height:calc(100svh - 9.5rem);padding:1rem}
    .stage{position:relative;width:var(--stage);height:var(--stage);display:grid;place-items:center}
    .stage::before,.stage::after{content:'';position:absolute;border-radius:50%;pointer-events:none;border:1px solid var(--line)}
    .stage::before{inset:2%} .stage::after{inset:12%;opacity:.6}
    .orbit-ring{position:absolute;inset:6%;border-radius:50%;border:1.5px dashed var(--sage);opacity:.4;animation:spin 60s linear infinite}
    .orbit-ring::after{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:11px;height:11px;border-radius:50%;background:var(--sage-dk);box-shadow:0 0 0 5px rgba(126,149,127,.16)}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* still water orb */
    .orb{position:relative;width:47%;height:47%;border-radius:50%;display:grid;place-items:center;text-align:center;
      box-shadow:0 24px 60px rgba(84,104,79,.20),inset 0 2px 16px rgba(255,255,255,.65);animation:breathe 8s ease-in-out infinite}
    .orb::before{content:'';position:absolute;inset:-14%;border-radius:50%;background:radial-gradient(circle,rgba(126,149,127,.16),transparent 68%);animation:aura 8s ease-in-out infinite;z-index:0}
    @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.045)}}
    @keyframes aura{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.12);opacity:.92}}
    .water{position:absolute;inset:0;width:100%;height:100%;border-radius:50%;z-index:1}
    .wave{animation:drift 18s linear infinite} .wave.w2{animation-duration:26s;animation-direction:reverse}
    @keyframes drift{from{transform:translateX(0)}to{transform:translateX(-200px)}}
    .spark{transform-box:fill-box;transform-origin:center;animation:rise 12s ease-in-out infinite;opacity:0}
    .spark.s2{animation-delay:4s}.spark.s3{animation-delay:8s}
    @keyframes rise{0%{transform:translateY(34px);opacity:0}30%{opacity:.7}80%{opacity:.2}100%{transform:translateY(-60px);opacity:0}}

    .orb-inner{position:relative;z-index:3;padding:0 14%}
    .orb-inner::before{content:'';position:absolute;inset:-30% -10%;border-radius:50%;background:radial-gradient(circle,rgba(251,251,249,.82),rgba(251,251,249,0) 70%);z-index:-1}
    .orb-prompt{font-family:var(--f-deco);font-style:italic;font-weight:500;font-size:clamp(1.15rem,3.6vmin,1.7rem);line-height:1.4;color:var(--sage-dk)}
    .orb-hint{font-size:clamp(.7rem,1.9vmin,.84rem);color:var(--ink-soft);margin-top:.5rem}

    .symptoms{position:absolute;inset:0}
    .chip{position:absolute;top:50%;left:50%;--r:calc(var(--stage)*0.40);transform:rotate(var(--a)) translate(var(--r)) rotate(calc(-1*var(--a)));transform-origin:0 0}
    .chip button{transform:translate(-50%,-50%);font-family:var(--f-body);font-size:clamp(.82rem,2.1vmin,1rem);font-weight:500;color:var(--ink);background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:999px;padding:.5rem 1.05rem;white-space:nowrap;cursor:pointer;backdrop-filter:blur(3px);box-shadow:0 6px 18px rgba(40,48,43,.07);transition:transform .25s,background .25s,color .25s,border-color .25s,box-shadow .25s;animation:float 6.5s ease-in-out infinite}
    .chip:nth-child(2) button{animation-delay:.6s}.chip:nth-child(3) button{animation-delay:1.2s}.chip:nth-child(4) button{animation-delay:1.8s}.chip:nth-child(5) button{animation-delay:2.4s}.chip:nth-child(6) button{animation-delay:3s}.chip:nth-child(7) button{animation-delay:3.6s}
    @keyframes float{0%,100%{translate:0 0}50%{translate:0 -6px}}
    .chip button:hover{background:linear-gradient(135deg,var(--sage),var(--sage-dk));color:#fff;border-color:transparent;box-shadow:0 10px 26px rgba(84,104,79,.34)}

    .response{position:absolute;inset:0;z-index:6;display:grid;place-items:center;text-align:center;padding:6% 7%;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .55s;border-radius:50%;background:radial-gradient(circle,rgba(251,251,249,.9) 55%,rgba(251,251,249,0) 78%)}
    .response.show{opacity:1;visibility:visible;pointer-events:auto}
    .response-card{max-width:28rem}
    .resp-symptom{font-size:.76rem;font-weight:600;letter-spacing:.18em;color:var(--sage-dk);margin-bottom:.7rem}
    .resp-text{font-family:var(--f-deco);font-style:italic;font-weight:500;font-size:clamp(1.12rem,3.3vmin,1.5rem);line-height:1.6;color:var(--ink)}
    .resp-actions{margin-top:1.5rem;display:flex;flex-direction:column;gap:.55rem;align-items:center}
    .btn-wa{display:inline-flex;align-items:center;justify-content:center;gap:.55rem;background:linear-gradient(135deg,var(--sage),var(--sage-dk));color:#fff;font-weight:700;font-size:1rem;border:none;border-radius:14px;padding:.8rem 1.6rem;cursor:pointer;box-shadow:0 12px 30px rgba(84,104,79,.32);transition:transform .2s,box-shadow .2s}
    .btn-wa:hover{transform:translateY(-2px)} .btn-wa svg{width:19px;height:19px}
    .btn-back{background:none;border:none;color:var(--ink-soft);font-family:var(--f-body);font-size:.9rem;font-weight:500;cursor:pointer;padding:.4rem .8rem;transition:color .2s}
    .btn-back:hover{color:var(--sage-dk)}
    .stage.answering .symptoms,.stage.answering .orb-inner{opacity:0;pointer-events:none}
    .symptoms,.orb-inner{transition:opacity .4s}

    .footer-cue{position:relative;z-index:5;text-align:center;padding:0 1.2rem clamp(1.4rem,4vh,2.4rem)}
    .footer-line{font-size:.82rem;color:var(--ink-soft);margin-bottom:.7rem}
    .footer-links{display:inline-flex;align-items:center;gap:1.1rem;flex-wrap:wrap;justify-content:center}
    .flink{font-size:.92rem;font-weight:600;color:var(--sage-dk);display:inline-flex;align-items:center;gap:.4rem;border-bottom:1px solid transparent;transition:border-color .2s}
    .flink:hover{border-color:var(--sage)} .flink svg{width:15px;height:15px}
    .dot-sep{width:4px;height:4px;border-radius:50%;background:var(--line)}
    .vtag{position:fixed;top:10px;inset-inline-start:12px;z-index:9;font-size:.7rem;letter-spacing:.12em;color:var(--ink-soft);background:rgba(255,255,255,.7);border:1px solid var(--line);border-radius:999px;padding:.2rem .7rem}

    @media (prefers-reduced-motion:reduce){.orb,.orb::before,.orbit-ring,.chip button,.wave,.spark{animation:none!important}}
    @media (max-width:460px){:root{--stage:94vw}.chip{--r:calc(var(--stage)*0.39)}.chip button{padding:.45rem .85rem}}
  </style>
</head>
<body>
  <div class="page-bg" aria-hidden="true"></div>
  <div class="vtag">A · בריכה שקטה</div>

  <header>
    <div class="wordmark">יפית מוכתרי</div>
    <div class="subrole">מטפלת הוליסטית · גוף–נפש</div>
  </header>

  <div class="stage-wrap">
    <div class="stage" id="stage">
      <span class="orbit-ring" aria-hidden="true"></span>
      <div class="orb">
        <svg class="water" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
          <defs>
            <clipPath id="orbClip"><circle cx="100" cy="100" r="100"/></clipPath>
            <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#EAF2EE"/><stop offset="0.5" stop-color="#BBD4CD"/><stop offset="1" stop-color="#7FA399"/>
            </linearGradient>
            <radialGradient id="sheen" cx="40%" cy="28%" r="55%"><stop offset="0" stop-color="#FFF" stop-opacity="0.6"/><stop offset="1" stop-color="#FFF" stop-opacity="0"/></radialGradient>
          </defs>
          <g clip-path="url(#orbClip)">
            <rect width="200" height="200" fill="url(#waterGrad)"/>
            <g class="wave w1"><path fill="rgba(255,255,255,0.30)" d="M0,92 q25,-9 50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 L400,200 L0,200 Z"/></g>
            <g class="wave w2"><path fill="rgba(126,149,127,0.26)" d="M0,104 q25,-7 50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 L400,200 L0,200 Z"/></g>
            <ellipse cx="100" cy="86" rx="62" ry="6" fill="rgba(255,255,255,0.22)"/>
            <circle class="spark s1" cx="80" cy="150" r="2.2" fill="#FFF"/><circle class="spark s2" cx="118" cy="158" r="1.6" fill="#FFF"/><circle class="spark s3" cx="100" cy="166" r="2" fill="#FFF"/>
            <rect width="200" height="200" fill="url(#sheen)"/>
          </g>
        </svg>
        <div class="orb-inner"><div class="orb-prompt">מה עולה בך<br/>עכשיו?</div><div class="orb-hint">געי במה שמרגיש קרוב</div></div>
      </div>
      <div class="symptoms" id="symptoms" role="list" aria-label="מה מרגישים כרגע"></div>
      <div class="response" id="response" aria-live="polite">
        <div class="response-card">
          <div class="resp-symptom" id="respSymptom"></div>
          <div class="resp-text" id="respText"></div>
          <div class="resp-actions">
            <a class="btn-wa" id="respWa" target="_blank" rel="noopener" href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>בואו נדבר על זה</a>
            <button class="btn-back" id="respBack" type="button">חזרה למעגל</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-cue">
    <div class="footer-line">כל מפגש נבנה לפי מה שעולה בך באותו רגע · קליניקה בתל אביב</div>
    <div class="footer-links">
      <a class="flink" href="#blog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>מהיומן של יפית</a>
      <span class="dot-sep" aria-hidden="true"></span>
      <a class="flink" id="footWa" target="_blank" rel="noopener" href="#"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>לשיחה בווטסאפ</a>
    </div>
  </div>

  <script>
    var PHONE='972547744141';
    var SYMPTOMS=[
      {key:'לחץ',text:'יש רגעים שהכול נדחס פנימה. לפעמים מספיק לעצור, ולתת לאוויר אחד להיכנס. כאן יש מקום לזה.'},
      {key:'חרדה',text:'כשמשהו בפנים דופק חזק, הוא לא בהכרח אויב. אפשר פשוט להישאר איתו רגע, בלי למהר לתקן.'},
      {key:'עייפות',text:'יש עייפות שאף שינה לא פותרת. היא של מי שנושא הרבה, בשקט. מותר להניח קצת מהמשקל.'},
      {key:'כאב פיזי',text:'הגוף לא תמיד מסביר במילים. לפעמים הוא רק מבקש שיקשיבו לו. כאן אפשר להתחיל מזה.'},
      {key:'תקיעות',text:'להיתקע זה לא להיכשל. זו לפעמים נקודת שקט, רגע לפני שהמים זורמים שוב.'},
      {key:'עומס רגשי',text:'לא הכול צריך להיפתר היום. מספיק לפנות פינה אחת קטנה, ולתת לה לנשום.'},
      {key:'חוסר שקט',text:'השקט לא רחוק כמו שנדמה. הוא מתחת לרעש, מחכה. אפשר לחזור אליו לאט.'}
    ];
    var symptomsEl=document.getElementById('symptoms'),stage=document.getElementById('stage'),response=document.getElementById('response'),respText=document.getElementById('respText'),respSymptom=document.getElementById('respSymptom'),respWa=document.getElementById('respWa'),respBack=document.getElementById('respBack');
    var n=SYMPTOMS.length;
    SYMPTOMS.forEach(function(s,i){var a=(360/n)*i;var c=document.createElement('div');c.className='chip';c.setAttribute('role','listitem');c.style.setProperty('--a',a+'deg');var b=document.createElement('button');b.type='button';b.textContent=s.key;b.addEventListener('click',function(){openResponse(s)});c.appendChild(b);symptomsEl.appendChild(c)});
    function waLink(s){return 'https://wa.me/'+PHONE+'?text='+encodeURIComponent('היי יפית, הגעתי דרך האתר. מה שעלה בי הוא '+s+'. אשמח לדבר.')}
    document.getElementById('footWa').href='https://wa.me/'+PHONE;
    function openResponse(s){respSymptom.textContent=s.key;respText.textContent='"'+s.text+'"';respWa.href=waLink(s.key);stage.classList.add('answering');response.classList.add('show')}
    function closeResponse(){response.classList.remove('show');stage.classList.remove('answering')}
    respBack.addEventListener('click',closeResponse);
    document.addEventListener('keydown',function(e){if(e.key==='Escape')closeResponse()});
    (function(){var m=decodeURIComponent(location.hash.replace(/^#open=/,''));var f=SYMPTOMS.filter(function(s){return s.key===m})[0];if(f)setTimeout(function(){openResponse(f)},300)})();
  </script>
</body>
</html>
