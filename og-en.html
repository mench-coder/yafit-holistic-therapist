<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG preview — יפית</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Frank+Ruhl+Libre:wght@300;400&family=Assistant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #FBFBF9;
      --mist:     #EEF1EC;
      --sage:     #7E957F;
      --sage-dk:  #54684F;
      --ink:      #28302B;
      --ink-soft: #76807A;
      --line:     #E2E5DF;
      --f-display:'Frank Ruhl Libre', Georgia, serif;
      --f-deco:   'Cormorant Garamond', Georgia, serif;
      --f-body:   'Assistant', Arial, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; }
    body {
      font-family: var(--f-body);
      background: var(--bg);
      color: var(--ink);
      direction: rtl;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* ---- beautiful full photo on the right ---- */
    .photo-bleed {
      position: absolute;
      top: 0; left: 0;
      width: 600px; height: 630px;
      overflow: hidden;
    }
    .photo-bleed img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: 60% 28%;
    }
    /* soft blend from the cream side into the photo */
    .photo-bleed::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to left, transparent 60%, rgba(251,251,249,0.65) 86%, var(--bg) 100%);
    }

    /* faint horizon motif on the text side */
    body::before {
      content: '';
      position: absolute;
      width: 620px; height: 620px;
      border-radius: 50%;
      border: 1px solid var(--line);
      top: 50%; right: -120px;
      transform: translateY(-50%);
    }

    /* ---- text block on the right side (RTL) ---- */
    .text {
      position: absolute;
      top: 50%; right: 84px;
      transform: translateY(-50%);
      width: 520px;
      text-align: right;
      z-index: 2;
    }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 1.05rem; font-weight: 600;
      color: var(--sage-dk);
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }
    .eyebrow .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--sage); box-shadow: 0 0 0 4px rgba(126,149,127,0.22); }

    h1 {
      font-family: var(--f-display);
      font-weight: 300;
      font-size: 4.8rem;
      line-height: 1;
      letter-spacing: -0.01em;
      margin-bottom: 1.1rem;
      text-align: right;
    }
    h1.wordmark { font-weight: 400; letter-spacing: 0.04em; }

    .tagline {
      font-family: var(--f-deco);
      font-style: italic;
      font-size: 2.55rem;
      line-height: 1.3;
      color: var(--sage-dk);
      margin-bottom: 1.7rem;
    }
    .tagline em { font-style: italic; color: var(--ink); }

    .pill {
      display: inline-flex; align-items: center; gap: 0.7rem;
      background: linear-gradient(135deg, var(--sage), var(--sage-dk));
      color: #fff;
      font-size: 1.5rem; font-weight: 700;
      border-radius: 100px;
      padding: 0.85rem 1.9rem;
      box-shadow: 0 16px 36px rgba(84,104,79,0.32);
    }
    .pill svg { width: 30px; height: 30px; }
  </style>
</head>
<body>
  <div class="photo-bleed">
    <img src="assets/images/styled/yafit-3-airy.jpeg" alt="יפית" />
  </div>

  <div class="text">
    <span class="eyebrow"><span class="dot"></span>מטפלת הוליסטית גוף-נפש</span>
    <h1 dir="ltr" class="wordmark">Yaff</h1>
    <p class="tagline">הגוף שלנו מדבר<br /><em>הגיע הזמן להקשיב לו</em></p>
    <span class="pill">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884"/></svg>
      בואו נדבר
    </span>
  </div>
</body>
</html>
