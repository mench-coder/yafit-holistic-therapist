<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Logo Versions — Yaff / יפית</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0ece4; font-family: Georgia, serif; padding: 48px 40px; }

  .page-title { color: #3A2215; font-size: 28px; margin-bottom: 4px; }
  .page-sub   { color: #9A7860; font-size: 14px; font-weight: normal; margin-bottom: 48px; }

  .section        { margin-bottom: 52px; }
  .section-label  { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
                    color: #B8873A; margin-bottom: 20px; border-bottom: 1px solid #EDE0CC;
                    padding-bottom: 8px; }

  .logo-grid { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }

  .logo-card {
    background: #faf6ee;
    border: 1px solid #EDE0CC;
    border-radius: 10px;
    padding: 20px 24px 14px;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .logo-card.dark-bg { background: #2C1A0E; border-color: #5C3D26; }
  .logo-card.white-bg { background: #ffffff; }

  .logo-card img { display: block; max-width: 100%; height: auto; }
  .logo-card span {
    font-size: 11px;
    color: #9A7860;
    letter-spacing: 1px;
    text-align: center;
  }
  .logo-card.dark-bg span { color: #D4A85C; }
</style>
</head>
<body>

  <h1 class="page-title">Logo Versions &nbsp;·&nbsp; גרסאות לוגו</h1>
  <p class="page-sub">Yaff — Holistic Therapist &nbsp;|&nbsp; יפית — מטפלת הוליסטית גוף-נפש</p>

  <!-- ENGLISH -->
  <div class="section">
    <div class="section-label">English — Yaff</div>
    <div class="logo-grid">
      <div class="logo-card">
        <img src="logo-wordmark-light-en.svg" width="460" alt="Wordmark Light EN">
        <span>Wordmark · Light</span>
      </div>
      <div class="logo-card dark-bg">
        <img src="logo-wordmark-dark-en.svg" width="460" alt="Wordmark Dark EN">
        <span>Wordmark · Dark</span>
      </div>
      <div class="logo-card">
        <img src="logo-badge-circle-en.svg" width="220" alt="Circle Badge EN">
        <span>Circle Badge</span>
      </div>
      <div class="logo-card white-bg">
        <img src="logo-minimal-sprig-en.svg" width="380" alt="Minimal Sprig EN">
        <span>Minimal Sprig</span>
      </div>
    </div>
  </div>

  <!-- HEBREW -->
  <div class="section">
    <div class="section-label">עברית — יפית</div>
    <div class="logo-grid">
      <div class="logo-card">
        <img src="logo-wordmark-light-he.svg" width="460" alt="Wordmark Light HE">
        <span>Wordmark · Light</span>
      </div>
      <div class="logo-card dark-bg">
        <img src="logo-wordmark-dark-he.svg" width="460" alt="Wordmark Dark HE">
        <span>Wordmark · Dark</span>
      </div>
      <div class="logo-card">
        <img src="logo-badge-circle-he.svg" width="220" alt="Circle Badge HE">
        <span>Circle Badge</span>
      </div>
      <div class="logo-card white-bg">
        <img src="logo-minimal-sprig-he.svg" width="380" alt="Minimal Sprig HE">
        <span>Minimal Sprig</span>
      </div>
    </div>
  </div>

</body>
</html>
