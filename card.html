<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>יפית | מטפלת הוליסטית גוף-נפש | דברו איתי בווטסאפ</title>
  <meta name="description" content="יפית מוכתרי — מטפלת הוליסטית גוף-נפש בתל אביב. NLP, רייקי, שיאצו, פרחי באך והילינג. שיחת היכרות ראשונה חינם — דברו איתי בווטסאפ." />
  <meta property="og:title" content="יפית | מטפלת הוליסטית גוף-נפש" />
  <meta property="og:description" content="שיחת היכרות ראשונה חינם — דברו איתי בווטסאפ" />
  <meta property="og:image" content="assets/images/yafit-3.jpeg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Frank+Ruhl+Libre:wght@300;400;500&family=Assistant:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream:        #FDFCF9;
      --sand-50:      #F5EFE6;
      --sand-100:     #EDE0CC;
      --sand-300:     #C8B49A;
      --bronze:       #B8873A;
      --bronze-muted: #8F6A2E;
      --sage:         #6B7C5A;
      --charcoal:     #2C1C0E;
      --charcoal-lt:  #6B5440;
      --wa:           #25D366;
      --wa-dark:      #1DA851;
      --font-display: 'Frank Ruhl Libre', Georgia, serif;
      --font-deco:    'Cormorant Garamond', Georgia, serif;
      --font-body:    'Assistant', Arial, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--sand-50);
      color: var(--charcoal);
      direction: rtl;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* soft atmosphere behind the card */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 45% at 80% 10%, rgba(184,135,58,0.10), transparent 60%),
        radial-gradient(ellipse 55% 50% at 15% 90%, rgba(107,124,90,0.10), transparent 60%);
      pointer-events: none;
    }

    img { display: block; max-width: 100%; }
    a   { color: inherit; text-decoration: none; }

    .card {
      position: relative;
      width: 100%;
      max-width: 420px;
      background: var(--cream);
      border: 1px solid var(--sand-100);
      border-radius: 18px;
      box-shadow:
        0 1px 2px rgba(44,28,14,0.04),
        0 12px 40px rgba(44,28,14,0.10),
        0 32px 80px rgba(44,28,14,0.08);
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      overflow: hidden;
      animation: cardIn 0.7s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px) scale(0.985); }
      to   { opacity: 1; transform: none; }
    }

    /* thin bronze top line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; right: 0; left: 0;
      height: 3px;
      background: linear-gradient(to left, transparent, var(--bronze), transparent);
    }

    .reveal { animation: rise 0.6s cubic-bezier(0.25,0.46,0.45,0.94) both; }
    .d1 { animation-delay: 0.15s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.35s; }
    .d4 { animation-delay: 0.45s; }
    .d5 { animation-delay: 0.55s; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    /* ---- portrait in an arch ---- */
    .portrait {
      width: 150px;
      height: 185px;
      margin: 0 auto 1.4rem;
      border-radius: 100px 100px 12px 12px;
      overflow: hidden;
      border: 1px solid var(--sand-300);
      padding: 5px;
      background: var(--cream);
    }
    .portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      border-radius: 95px 95px 9px 9px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--sage);
      background: rgba(107,124,90,0.09);
      border: 1px solid rgba(107,124,90,0.25);
      border-radius: 100px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.1rem;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sage);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }

    .eyebrow {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.28em;
      color: var(--bronze-muted);
      margin-bottom: 0.55rem;
    }

    h1 {
      font-family: var(--font-display);
      font-weight: 400;
      font-size: 2.3rem;
      line-height: 1.15;
      margin-bottom: 0.4rem;
    }

    .tagline {
      font-family: var(--font-deco);
      font-style: italic;
      font-size: 1.18rem;
      color: var(--charcoal-lt);
      margin-bottom: 1.3rem;
    }
    .tagline em {
      font-style: italic;
      color: var(--bronze-muted);
    }

    .divider {
      width: 56px;
      height: 1px;
      background: linear-gradient(to left, transparent, var(--bronze), transparent);
      margin: 0 auto 1.3rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.45rem;
      margin-bottom: 1.7rem;
    }
    .chip {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--charcoal-lt);
      background: var(--sand-50);
      border: 1px solid var(--sand-100);
      border-radius: 100px;
      padding: 0.28rem 0.8rem;
    }

    /* ---- WhatsApp CTA ---- */
    .btn-wa {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.65rem;
      width: 100%;
      background: var(--wa);
      color: #fff;
      font-family: var(--font-body);
      font-size: 1.08rem;
      font-weight: 600;
      border-radius: 14px;
      padding: 1.05rem 1rem;
      box-shadow: 0 6px 20px rgba(37,211,102,0.35);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
      margin-bottom: 0.7rem;
    }
    .btn-wa:hover {
      background: var(--wa-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(37,211,102,0.45);
    }
    .btn-wa svg { width: 22px; height: 22px; flex-shrink: 0; }

    .btn-call {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.55rem;
      width: 100%;
      background: transparent;
      color: var(--charcoal);
      font-size: 0.95rem;
      font-weight: 500;
      border: 1px solid var(--sand-300);
      border-radius: 14px;
      padding: 0.85rem 1rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .btn-call:hover { border-color: var(--bronze); background: var(--sand-50); }
    .btn-call svg { width: 17px; height: 17px; }

    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.7rem;
      font-size: 0.8rem;
      color: var(--charcoal-lt);
      margin-top: 1.4rem;
    }
    .meta-sep { color: var(--sand-300); }

    .site-link {
      display: inline-block;
      margin-top: 0.9rem;
      font-size: 0.8rem;
      color: var(--bronze-muted);
      border-bottom: 1px solid var(--sand-300);
      padding-bottom: 1px;
      transition: color 0.2s, border-color 0.2s;
    }
    .site-link:hover { color: var(--bronze); border-color: var(--bronze); }

    @media (max-width: 380px) {
      .card { padding: 2rem 1.4rem 1.6rem; }
      h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <main class="card">

    <div class="portrait reveal">
      <img src="assets/images/yafit-3.jpeg" alt="יפית — מטפלת הוליסטית גוף-נפש" />
    </div>

    <div class="reveal d1">
      <span class="badge"><span class="badge-dot"></span>שיחת היכרות ראשונה — חינם</span>
    </div>

    <div class="reveal d2">
      <span class="eyebrow">מטפלת הוליסטית גוף-נפש · תל אביב</span>
      <h1>יפית</h1>
      <p class="tagline">הגוף שלנו מדבר — הגיע הזמן <em>להקשיב לו</em></p>
      <div class="divider"></div>
    </div>

    <div class="chips reveal d3">
      <span class="chip">NLP</span>
      <span class="chip">רייקי</span>
      <span class="chip">שיאצו</span>
      <span class="chip">פרחי באך</span>
      <span class="chip">הילינג</span>
      <span class="chip">שיחה מעמיקה</span>
    </div>

    <div class="reveal d4">
      <a class="btn-wa" id="waBtn" target="_blank" rel="noopener" href="#">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        דברו איתי בווטסאפ
      </a>
      <a class="btn-call" id="callBtn" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        או בשיחת טלפון
      </a>
    </div>

    <div class="reveal d5">
      <div class="meta">
        <span>20+ שנות ניסיון</span>
        <span class="meta-sep">·</span>
        <span>קליניקה בתל אביב</span>
      </div>
      <a class="site-link" href="index.html">לאתר המלא ←</a>
    </div>

  </main>

  <script>
    // ===== מספר ווטסאפ — לעדכן במקום אחד בלבד =====
    var PHONE = '972547744141';
    var MSG = 'היי יפית, הגעתי דרך הכרטיס שלך ואשמח לשמוע עוד';
    document.getElementById('waBtn').href =
      'https://wa.me/' + PHONE + '?text=' + encodeURIComponent(MSG);
    document.getElementById('callBtn').href = 'tel:+' + PHONE;
  </script>

</body>
</html>
