<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yaff — Logo Versions</title>
<style>
  body { background: #f0ece4; font-family: Georgia, serif; padding: 40px; }
  h1 { color: #3A2215; margin-bottom: 8px; }
  h2 { color: #9A7860; font-size: 14px; font-weight: normal; margin: 0 0 48px; }
  .logo-row { display: flex; flex-wrap: wrap; gap: 32px; align-items: flex-start; }
  .logo-item { background: transparent; }
  .logo-item p { font-size: 12px; color: #9A7860; margin: 8px 0 0; text-align: center; }
</style>
</head>
<body>
  <h1>Yaff — Logo Versions</h1>
  <h2>Holistic Therapist · Brand Identity</h2>
  <div class="logo-row">
    <div class="logo-item">
      <img src="logo-wordmark-light.svg" alt="Wordmark Light" width="500">
      <p>Wordmark · Light</p>
    </div>
    <div class="logo-item">
      <img src="logo-wordmark-dark.svg" alt="Wordmark Dark" width="500">
      <p>Wordmark · Dark</p>
    </div>
    <div class="logo-item">
      <img src="logo-badge-circle.svg" alt="Circle Badge" width="280">
      <p>Circle Badge</p>
    </div>
    <div class="logo-item" style="background:#fff; padding:16px; border-radius:8px;">
      <img src="logo-minimal-sprig.svg" alt="Minimal Sprig" width="420">
      <p>Minimal Sprig</p>
    </div>
  </div>
</body>
</html>
